<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aabha Sewak — Designer & Animator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .hero { padding: calc(var(--nav-h) + 32px) 24px 40px; }
    .hero-label {
      font-family: var(--mono); font-size: 10px; letter-spacing: .14em;
      text-transform: uppercase; color: var(--fg-dim);
    }
    .works {
      padding: 0 2px 80px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
    }
    @media (max-width: 900px) { .works { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .works { grid-template-columns: 1fr; } }

    .work-item {
      display: block; text-decoration: none; color: var(--fg);
      position: relative; overflow: hidden; background: #181818; aspect-ratio: 4/3;
    }
    .work-thumb {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform .6s cubic-bezier(.4,0,.2,1), filter .4s;
      filter: brightness(.85) saturate(.9);
    }
    .work-item:hover .work-thumb {
      transform: scale(1.04);
      filter: brightness(1) saturate(1);
    }
    .work-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a1a1a 0%, #222 50%, #1a1a1a 100%);
      display: flex; align-items: center; justify-content: center;
      transition: transform .6s cubic-bezier(.4,0,.2,1);
    }
    .work-item:hover .work-placeholder { transform: scale(1.04); }
    .work-placeholder-inner {
      font-family: var(--mono); font-size: 10px;
      color: #333; letter-spacing: .1em; text-transform: uppercase; text-align: center; padding: 0 16px;
    }
    .work-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 20px 16px 14px;
      background: linear-gradient(transparent, rgba(0,0,0,.8));
      transform: translateY(6px); opacity: 0;
      transition: transform .3s, opacity .3s;
    }
    .work-item:hover .work-info { transform: translateY(0); opacity: 1; }
    .work-tags {
      font-family: var(--mono); font-size: 9px; color: var(--fg-dim);
      letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px;
    }
    .work-title { font-family: var(--sans); font-weight: 700; font-size: 14px; }
    .work-strip {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 10px 14px 8px;
      display: flex; justify-content: space-between;
    }
    .work-type { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.5); }
    .work-year { font-family: var(--mono); font-size: 9px; color: rgba(255,255,255,.35); }
  </style>
</head>
<body>
  <div id="cursor"></div>

  <nav>
    <a href="index.html" class="nav-logo">Aabha Sewak</a>
    <div class="nav-right">
      <div class="nav-location">NYC ⏤ US &nbsp;|&nbsp; <span id="clock">--:--:--</span></div>
      <button class="menu-btn" id="menuOpen">Menu</button>
    </div>
  </nav>

  <div id="menu-overlay">
    <div class="menu-top">
      <a href="index.html" class="nav-logo">Aabha Sewak</a>
      <button class="menu-close" id="menuClose">Close</button>
    </div>
    <div class="menu-body">
      <a href="index.html" class="menu-link">Home</a>
      <a href="works/index.html" class="menu-link">Works</a>
      <a href="about.html" class="menu-link">About</a>
      <a href="contact.html" class="menu-link">Contact</a>
    </div>
    <div class="menu-footer">
      <div class="menu-social">
        <a href="https://www.instagram.com/" target="_blank">Instagram</a>
        <a href="https://x.com/" target="_blank">Twitter X</a>
        <a href="https://www.linkedin.com/" target="_blank">LinkedIn</a>
      </div>
      <div class="menu-loc">Location — Timezone<span>NYC ⏤ US</span><span id="clock2">--:--:--</span></div>
    </div>
  </div>

  <main class="page-enter">
    <div class="hero">
      <p class="hero-label">Designer & Animator</p>
    </div>
    <section class="works" id="works"></section>
  </main>

  <footer>
    <p class="footer-copy">© 2026 Aabha Sewak. All rights reserved.</p>
    <div class="footer-social">
      <a href="https://www.instagram.com/" target="_blank">Instagram</a>
      <a href="https://x.com/" target="_blank">Twitter X</a>
      <a href="https://www.linkedin.com/" target="_blank">LinkedIn</a>
    </div>
  </footer>

  <script src="shared.js"></script>
  <script>
    var grid = document.getElementById('works');
    window.WORKS_DATA.forEach(function(w) {
      var a = document.createElement('a');
      a.href = 'works/' + w.slug + '.html';
      a.className = 'work-item';

      var thumbHtml = w.img
        ? '<img class="work-thumb" src="assets/' + w.img + '" alt="' + w.title + '" loading="lazy" />'
        : '<div class="work-placeholder"><div class="work-placeholder-inner">' + w.title + '</div></div>';

      a.innerHTML =
        thumbHtml +
        '<div class="work-strip"><span class="work-type">' + w.type + '</span><span class="work-year">' + w.year + '</span></div>' +
        '<div class="work-info"><div class="work-tags">' + w.cat + '</div><div class="work-title">' + w.title + '</div></div>';

      a.addEventListener('mouseenter', function() { window.cur.classList.add('expand'); });
      a.addEventListener('mouseleave', function() { window.cur.classList.remove('expand'); });
      grid.appendChild(a);
    });
  </script>
</body>
</html>
