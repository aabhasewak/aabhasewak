<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works — Aabha Sewak</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../shared.css" />
  <style>
    .works-list {
      padding-top: var(--nav-h);
      padding-bottom: 80px;
    }

    .work-row {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 18px 48px;
      border-bottom: 1px solid #1a1a1a;
      text-decoration: none;
      color: var(--fg);
      cursor: none;
      transition: background .25s;
    }
    .work-row:first-child { border-top: 1px solid #1a1a1a; }
    .work-row:hover { background: #111; }

    .work-row-meta-left {
      position: absolute;
      left: 24px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--fg-dim);
      line-height: 1.5;
    }

    .work-row-title {
      font-family: var(--sans);
      font-weight: 800;
      font-size: clamp(20px, 4vw, 52px);
      text-transform: uppercase;
      letter-spacing: -.01em;
      text-align: center;
      transition: opacity .2s;
    }
    .work-row:hover .work-row-title { opacity: .6; }

    .work-row-year {
      position: absolute;
      right: 24px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .08em;
      color: var(--fg-dim);
    }

    /* hover image that follows cursor */
    #hover-img {
      position: fixed;
      width: 280px;
      height: 200px;
      object-fit: cover;
      pointer-events: none;
      z-index: 500;
      opacity: 0;
      transform: translate(-50%, -60%) scale(.96);
      transition: opacity .25s, transform .25s;
      border: none;
    }
    #hover-img.visible {
      opacity: 1;
      transform: translate(-50%, -60%) scale(1);
    }
  </style>
</head>
<body>
  <div id="cursor"></div>
  <img id="hover-img" src="" alt="" />

  <nav>
    <a href="../index.html" class="nav-logo">Aabha Sewak</a>
    <div class="nav-right">
      <div class="nav-location">NYC ⏤ US &nbsp;|&nbsp; <span id="clock">--:--:--</span></div>
      <button class="menu-btn" id="menuOpen">Menu</button>
    </div>
  </nav>

  <div id="menu-overlay">
    <div class="menu-top">
      <a href="../index.html" class="nav-logo">Aabha Sewak</a>
      <button class="menu-close" id="menuClose">Close</button>
    </div>
    <div class="menu-body">
      <a href="../index.html" class="menu-link">Home</a>
      <a href="index.html" class="menu-link">Works</a>
      <a href="../about.html" class="menu-link">About</a>
      <a href="../contact.html" class="menu-link">Contact</a>
    </div>
    <div class="menu-footer">
      <div class="menu-social">
        <a href="https://www.instagram.com/" target="_blank">Instagram</a>
        <a href="https://x.com/" target="_blank">Twitter X</a>
        <a href="https://www.linkedin.com/" target="_blank">LinkedIn</a>
      </div>
      <div class="menu-loc">Location — Timezone<span>NYC ⏤ US</span><span id="clock2">--:--:--</span></div>
    </div>
  </div>

  <main class="page-enter">
    <div class="works-list" id="works"></div>
  </main>

  <footer>
    <p class="footer-copy">© 2026 Aabha Sewak. All rights reserved.</p>
    <div class="footer-social">
      <a href="https://www.instagram.com/" target="_blank">Instagram</a>
      <a href="https://x.com/" target="_blank">Twitter X</a>
      <a href="https://www.linkedin.com/" target="_blank">LinkedIn</a>
    </div>
  </footer>

  <script src="../shared.js"></script>
  <script>
    var list = document.getElementById('works');
    var hoverImg = document.getElementById('hover-img');

    // track mouse for hover image
    document.addEventListener('mousemove', function(e) {
      hoverImg.style.left = e.clientX + 'px';
      hoverImg.style.top  = e.clientY + 'px';
    });

    window.WORKS_DATA.forEach(function(w) {
      var a = document.createElement('a');
      a.href = w.slug + '.html';
      a.className = 'work-row';

      a.innerHTML =
        '<div class="work-row-meta-left">' + w.type + '<br>' + w.cat + '</div>' +
        '<div class="work-row-title">' + w.title + '</div>' +
        '<div class="work-row-year">' + w.year + '</div>';

      // hover image preview if project has an img
      if (w.img) {
        a.addEventListener('mouseenter', function() {
          hoverImg.src = '../assets/' + w.img;
          hoverImg.classList.add('visible');
          window.cur.classList.add('expand');
        });
        a.addEventListener('mouseleave', function() {
          hoverImg.classList.remove('visible');
          window.cur.classList.remove('expand');
        });
      } else {
        a.addEventListener('mouseenter', function() { window.cur.classList.add('expand'); });
        a.addEventListener('mouseleave', function() { window.cur.classList.remove('expand'); });
      }

      list.appendChild(a);
    });
  </script>
</body>
</html>
